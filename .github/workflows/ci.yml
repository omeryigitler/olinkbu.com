name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - fix/project-stability
      - feature/**

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint 2>&1 | tee typecheck.log

      - name: Upload typecheck log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-log
          path: typecheck.log

      - name: Build
        run: npm run build
